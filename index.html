<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>田牧恩典計時器</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐑</text></svg>">
    <style>
        /* 莫蘭迪配色變數 */
        :root {
            --bg-color: #F2F0EB;        /* 燕麥色背景 */
            --primary: #8C9E98;         /* 莫蘭迪綠 */
            --secondary: #BFAEA8;       /* 霧玫瑰粉 */
            --accent: #7D8A93;          /* 霧霾藍 */
            --text-main: #5C5C5C;       /* 深灰字體 */
            --card-bg: #ffffff;
            --btn-hover: #A3B5AF;
        }

        @font-face {
            font-family: 'ChenYuluoyan';
            src: url('fonts/ChenYuluoyan-2.0-Thin.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 0; /* 增加上下padding以免內容太擠 */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh; /* 改為min-height允許滾動 */
            overflow-x: hidden; /* 防止水平滾動條 */
            position: relative;
        }

        /* 背景漂浮動畫元素 (保持不變) */
        .floating-shape {
            position: fixed; /* 改為fixed背景不動 */
            border-radius: 50%;
            opacity: 0.4;
            z-index: -1;
            animation: float 15s infinite ease-in-out;
        }
        .shape1 { width: 100px; height: 100px; background: var(--secondary); top: 10%; left: 10%; animation-delay: 0s; }
        .shape2 { width: 150px; height: 150px; background: var(--primary); bottom: 20%; right: 10%; animation-delay: 2s; }
        .shape3 { width: 80px; height: 80px; background: var(--accent); top: 40%; right: 20%; animation-delay: 4s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* 通用卡片樣式 */
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 2px solid #fff;
            position: relative;
            z-index: 10;
            margin-bottom: 30px; /* 卡片之間的間距 */
            backdrop-filter: blur(5px);
        }

        /* 主標題樣式 */
        h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 30px;
        }
        
        .section-title {
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        /* 計時器樣式 */
        .timer-box {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .number {
            font-size: 1.8rem; /* 稍微調小一點適應手機 */
            font-weight: bold;
            color: var(--text-main);
            background: var(--bg-color);
            width: 55px;
            height: 55px;
            line-height: 55px;
            border-radius: 15px;
            margin-bottom: 5px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);
        }

        .label {
            font-size: 0.8rem;
            color: var(--accent);
        }

        /* 經文卡互動區 */
        .verse-card {
            font-family: 'ChenYuluoyan', sans-serif;
            margin-top: 30px;
            padding: 20px;
            background-color: var(--bg-color);
            border-radius: 20px;
            border-left: 5px solid var(--secondary);
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        .verse-text {
            font-size: 2rem;
            font-style: italic;
            line-height: 1.6;
        }

        .verse-ref {
            margin-top: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: right;
            color: var(--primary);
        }

        /* 通用按鈕樣式 */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 5px;
            color: white;
            touch-action: manipulation; /* 防止雙擊縮放 */
        }
        
        .btn-primary {
            background-color: var(--primary);
            margin-top: 25px;
            padding: 12px 30px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        .btn:active { transform: translateY(0); }
        .btn-primary:hover { background-color: var(--btn-hover); }

        /* --- 新增：心情按鈕區樣式 --- */
        .mood-buttons-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        
        .mood-btn {
            background-color: #fff; /* 莫蘭迪基底 */
            color: var(--text-main);
            border: 2px solid var(--secondary);
        }
        .mood-btn span { margin-right: 8px; font-size: 1.4rem; }
        
        /* 不同心情的微調 (保持柔和) */
        .mood-love:hover { background-color: #F0E6E6; border-color: #D4A5A5; }
        .mood-angry:hover { background-color: #EFEBE9; border-color: #A1887F; }
        .mood-poop:hover { background-color: #EBE8E4; border-color: #8D6E63; }


        /* 裝飾圖示 */
        .icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: inline-block;
            animation: pulse 2s infinite;
            cursor: pointer; /* 增加手型游標提示可點擊 */
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* --- 修改：Emoji 上升特效 --- */
        #emoji-rain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* 讓點擊穿透，不影響操作 */
            z-index: 9999;
            overflow: hidden;
        }

        .rising-emoji { /* 更改 class 名稱 */
            position: absolute;
            bottom: -50px; /* 從畫面外下方開始 */
            user-select: none;
            animation-name: rise; /* 更改動畫名稱 */
            animation-timing-function: ease-out; /* 調整為更自然的上升曲線 */
            animation-fill-mode: forwards;
        }

        @keyframes rise { /* 更改動畫關鍵幀 */
            0% {
                transform: translateY(0px) rotate(var(--start-rotate, 0deg));
                opacity: 0.8;
            }
            100% {
                transform: translateY(-110vh) rotate(var(--end-rotate, 360deg)); /* 上升到畫面外上方並旋轉 */
                opacity: 0; /* 上升過程漸漸消失 */
            }
        }

        /* --- 新增：超級 Emoji 特效 --- */
        .super-emoji {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 200px;
            z-index: 10000;
            animation: super-emoji-animation 2s ease-out forwards;
            -webkit-backface-visibility: hidden;
            -moz-backface-visibility: hidden;
            -ms-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        @keyframes super-emoji-animation {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(0deg);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5) rotate(360deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.2) rotate(720deg);
                opacity: 0;
            }
        }

        /* --- 新增：長按 Emoji 特效 --- */
        #long-press-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10001;
        }

        /* --- 新增：煙火容器 --- */
        #fireworks-bg, #fireworks-fg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #fireworks-bg {
            z-index: -2;
            opacity: 0.4;
        }
        #fireworks-fg {
            z-index: 20; /* 位於 .card (z-index 10) 之前 */
            opacity: 0.6;
        }

        .long-press-emoji {
            font-size: 50px;
            position: absolute;
            animation-fill-mode: forwards;
            animation-timing-function: ease-in;
        }

        @keyframes long-press-scale {
            from {
                transform: scale(1);
                opacity: 1;
            }
            to {
                transform: scale(10);
                opacity: 1;
            }
        }

        .particle {
            position: absolute;
            font-size: 60px; /* 爆炸時的 emoji 變更大 */
            user-select: none;
            animation: explode 0.7s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(0);
                opacity: 0;
            }
        }

    </style>
</head>
<body>

    <div class="floating-shape shape1"></div>
    <div class="floating-shape shape2"></div>
    <div class="floating-shape shape3"></div>
    
    <div id="fireworks-bg"></div>
    <div id="fireworks-fg"></div>
    <div id="emoji-rain-container"></div>
    <div id="long-press-container"></div>

    <div class="card">
        <div class="icon" onclick="releaseEmojis('🐑')">🐑</div>
        <h1>田牧恩典計時器</h1>
        <div class="subtitle">數算每一個事奉的日子，都是恩典的記號</div>

        <div class="timer-box">
            <div class="time-unit">
                <span class="number" id="days">0</span>
                <span class="label">天</span>
            </div>
            <div class="time-unit">
                <span class="number" id="hours">0</span>
                <span class="label">時</span>
            </div>
            <div class="time-unit">
                <span class="number" id="minutes">0</span>
                <span class="label">分</span>
            </div>
            <div class="time-unit">
                <span class="number" id="seconds">0</span>
                <span class="label">秒</span>
            </div>
        </div>

		<!-- 暫時隱藏-->
		<!--

        <div>
            <p style="font-size: 0.9rem; color: #888;">成為牧師已經...</p>
        </div>
		-->

        <div class="verse-card">
            <div class="verse-text" id="verse-content"></div>
            <div class="verse-ref" id="verse-ref"></div>
        </div>

        <button class="btn btn-primary" onclick="getNewVerse()">領取新的話語 ✨</button>
    </div>

    <div class="card">
        <h2 class="section-title">今日心情點播 🎧</h2>
        <p style="font-size: 0.9rem; color: #888; margin-bottom: 20px;">不管今天服事心情如何，點一下釋放情緒吧！</p>
        
        <div class="mood-buttons-container">
            <button class="btn mood-btn mood-love" data-emoji="❤️">
                <span>❤️</span> 充滿感恩愛心
            </button>
            <button class="btn mood-btn mood-angry" data-emoji="😡">
                <span>😡</span> 有翊點森氣氣
            </button>
            <button class="btn mood-btn mood-poop" data-emoji="💩">
                <span>💩</span> 想請人吃大便
            </button>
            <button class="btn mood-btn" id="fire-button">
                <span>💩</span> 更多請吃大便
            </button>
            <button class="btn mood-btn mood-cat" data-emoji="🐱">
                <span>🐱</span> 需要貓咪療癒
            </button>
        </div>
    </div>

    <video id="fullscreen-video" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10002; background-color: black;" controls>
        <source src="video/pu.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script src="https://unpkg.com/fireworks-js@2.x/dist/index.umd.js"></script>

    <script>
        // ==========================================
        // 【請在此設定按立牧師的日期】
        // 格式：Year, Month (0-11, 1月是0), Day, Hour, Minute, Second
        // 例如：2023年10月15日 下午3點30分 => new Date(2023, 9, 15, 15, 30, 0)
        // 注意：月份要減 1 (例如 7月要寫 6)
        // ==========================================
        
        // 假設按立日期是 2024年 1月 1日 上午10點 (請修改這裡)
        const ordinationDate = new Date(2025, 10, 29, 14, 30, 0); 
        
        let fireworksBG = null;
        let fireworksFG = null;
        function startFireworks() {
            if (fireworksBG || fireworksFG) return;
            const bgContainer = document.getElementById('fireworks-bg');
            const fgContainer = document.getElementById('fireworks-fg');
            
            if (typeof Fireworks === 'undefined') {
                console.error('Fireworks library not loaded');
                return;
            }
            const FireworksConstructor = (typeof Fireworks.Fireworks === 'function') ? Fireworks.Fireworks : Fireworks;
            
            // 背景煙火：較多粒子，作為底色
            fireworksBG = new FireworksConstructor(bgContainer, {
                autoresize: true,
                acceleration: 1.02,
                friction: 0.98,
                gravity: 1.2,
                particles: 40,
                traceLength: 4,
                traceSpeed: 5,
                explosion: 6,
                intensity: 10,
                flickering: 60,
                lineStyle: 'round',
                hue: { min: 0, max: 360 },
                delay: { min: 60, max: 100 },
                rocketsPoint: { min: 50, max: 50 },
                lineWidth: { explosion: { min: 1, max: 2 }, trace: { min: 0.5, max: 1 } },
                brightness: { min: 30, max: 60 },
                decay: { min: 0.01, max: 0.02 },
                mouse: { click: false, move: false, max: 1 }
            });

            // 前景煙火：非常稀疏，增加立體感但不會遮擋文字
            fireworksFG = new FireworksConstructor(fgContainer, {
                autoresize: true,
                acceleration: 1.02,
                friction: 0.98,
                gravity: 1.2,
                particles: 15, // 粒子極少
                traceLength: 3,
                traceSpeed: 5,
                explosion: 5,
                intensity: 25, // 強度低，偶爾出現一次
                flickering: 50,
                lineStyle: 'round',
                hue: { min: 0, max: 360 },
                delay: { min: 150, max: 250 }, // 延遲很長，偶爾才噴發一次
                rocketsPoint: { min: 50, max: 50 },
                lineWidth: { explosion: { min: 1, max: 2 }, trace: { min: 0.5, max: 1 } },
                brightness: { min: 30, max: 60 },
                decay: { min: 0.01, max: 0.02 },
                mouse: { click: false, move: false, max: 1 }
            });

            fireworksBG.start();
            fireworksFG.start();
        }

        // 恩典經文庫 (您可以自由新增)
        const verses = [
            { text: "務要牧養在你們中間神的群羊，按著神旨意照管他們。", ref: "彼得前書 5:2" },
            { text: "我一生一世必有恩惠慈愛隨著我；我且要住在耶和華的殿中，直到永遠。", ref: "詩篇 23:6" },
            { text: "你以恩典為年歲的冠冕，你的路徑都滴下脂油。", ref: "詩篇 65:11" },
            { text: "若不是耶和華建造房屋，建造的人就枉然勞力。", ref: "詩篇 127:1" },
            { text: "我的恩典夠你用的，因為我的能力是在人的軟弱上顯得完全。", ref: "哥林多後書 12:9" },
            { text: "流淚撒種的，必歡呼收割。", ref: "詩篇 126:5" },
            { text: "看哪，我差你們去，如同羊進入狼群；所以你們要靈巧像蛇，馴良像鴿子。", ref: "馬太福音 10:16" },
            { text: "我們行善，不可喪志；若不灰心，到了時候就要收成。", ref: "加拉太書 6:9" },

            // 約翰衛斯理《聖約禱文》
            { text: "我不再屬於自己，而是祢的。", ref: "約翰衛斯理《聖約禱文》" },
            { text: "把我放在祢想放的地方，把我列在祢列的等級。", ref: "約翰衛斯理《聖約禱文》" },
            { text: "使我去身體力行，使我去經歷苦難。", ref: "約翰衛斯理《聖約禱文》" },
            { text: "讓我為祢所用或為祢所閒置。", ref: "約翰衛斯理《聖約禱文》" },
            { text: "為祢升高，或為祢而降卑。", ref: "約翰衛斯理《聖約禱文》" },
            { text: "讓我被充滿，讓我被倒空。", ref: "約翰衛斯理《聖約禱文》" },
            { text: "讓我樣樣都有，讓我一無所有。", ref: "約翰衛斯理《聖約禱文》" },
            { text: "我自由並全心的把一切交出，討祢喜悅並任祢支配。", ref: "約翰衛斯理《聖約禱文》" },
            { text: "榮耀及賜福的上帝，聖父、聖子及聖靈啊！現在祢是我的，我也是祢的了。", ref: "約翰衛斯理《聖約禱文》" }
        ];


        // --- Emoji 彩蛋功能變數 ---
        let emojiClickCount = 0;
        let lastClickTime = 0;
        const COMBO_THRESHOLD = 10; // 連續點擊次數門檻
        const COMBO_TIMEOUT = 1000; // 連續點擊的超時時間 (1秒)

        // --- 計時器功能 ---
        function updateTimer() {
            const now = new Date();
            const diff = now - ordinationDate;

            // 如果日期還沒到，顯示全0
            if (diff < 0) {
                 document.getElementById("days").innerText = "0";
                 document.getElementById("hours").innerText = "0";
                 document.getElementById("minutes").innerText = "0";
                 document.getElementById("seconds").innerText = "0";
                 return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            if (days > 0 && days % 100 === 0) {
                startFireworks();
            } else if (fireworksBG || fireworksFG) {
                if (fireworksBG) {
                    fireworksBG.stop();
                    fireworksBG = null;
                    document.getElementById('fireworks-bg').innerHTML = '';
                }
                if (fireworksFG) {
                    fireworksFG.stop();
                    fireworksFG = null;
                    document.getElementById('fireworks-fg').innerHTML = '';
                }
            }

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;
        }

        // --- 經文功能 ---
        function getNewVerse() {
            const randomIndex = Math.floor(Math.random() * verses.length);
            const verse = verses[randomIndex];
            
            // 加上淡出淡入效果
            const card = document.querySelector('.verse-card');
            card.style.opacity = 0;
            
            setTimeout(() => {
                document.getElementById("verse-content").innerText = "「" + verse.text + "」";
                document.getElementById("verse-ref").innerText = verse.ref;
                card.style.opacity = 1;
            }, 300);
        }

        // --- 新增：超級 Emoji 特效 ---
        function showSuperEmoji(emojiChar) {
            const container = document.getElementById('emoji-rain-container');
            const superEmoji = document.createElement('span');
            superEmoji.innerText = emojiChar;
            superEmoji.classList.add('super-emoji');
            
            container.appendChild(superEmoji);

            // 動畫結束後移除元素
            setTimeout(() => {
                superEmoji.remove();
            }, 3000); // 動畫時長為 3s
        }


        // --- 修改：Emoji 上升特效功能 ---
        function releaseEmojis(emojiChar) { // 更改函數名稱以更貼切行為
            // 處理連續點擊彩蛋
            const now = Date.now();
            if (now - lastClickTime > COMBO_TIMEOUT) {
                emojiClickCount = 1; // 超時，重置計數器
            } else {
                emojiClickCount++; // 未超時，計數加一
            }
            lastClickTime = now; // 更新最後點擊時間

            if (emojiClickCount === COMBO_THRESHOLD) {
                showSuperEmoji(emojiChar);
                emojiClickCount = 0; // 觸發後歸零
                return; // 觸發超級彩蛋後，不執行普通 emoji 雨
            }

            // 如果是 '💩' emoji，播放音效
            if (emojiChar === '💩') {
                const currentPoopSound = new Audio('audio/poop.mp3');
                currentPoopSound.play();
            }


            const container = document.getElementById('emoji-rain-container');
            const emojiCount = 40; // 調整數量，讓上升感覺更優雅
                const screenWidth = window.innerWidth;
                const safeScreenWidth = screenWidth - 50; // 減去一個安全寬度，例如50px

            for (let i = 0; i < emojiCount; i++) {
                const span = document.createElement('span');
                span.innerText = emojiChar;
                span.classList.add('rising-emoji'); // 使用新的 class 名稱
                
                // 隨機化起始位置、大小和上升速度
                const left = Math.random() * safeScreenWidth; // 在安全寬度內生成
                const size = Math.random() * 25 + 20; // 20px 到 45px 大小
                const duration = Math.random() * 4 + 4; // 4秒 到 8秒 上升時間 (稍長一點更飄逸)
                const delay = Math.random() * 0.8; // 輕微的延遲開始
                
                // 隨機化旋轉角度
                const startRotate = Math.random() * 360;
                const endRotate = startRotate + (Math.random() - 0.5) * 720; // 在起始角度上增減最多360度

                span.style.left = `${left}px`;
                span.style.fontSize = `${size}px`;
                span.style.animationDuration = `${duration}s`;
                span.style.animationDelay = `${delay}s`;
                span.style.setProperty('--start-rotate', `${startRotate}deg`);
                span.style.setProperty('--end-rotate', `${endRotate}deg`);

                container.appendChild(span);

                // 動畫結束後移除元素，避免佔用記憶體
                setTimeout(() => {
                    span.remove();
                }, (duration + delay) * 1000);
            }
        }

        // --- 新增：長按 Emoji 功能 ---
        function initLongPress() {
            const buttons = document.querySelectorAll('.mood-btn[data-emoji]');
            let pressTimer = null;
            let longPressTriggered = false;
            let longPressEmoji = null;

            const LONG_PRESS_DURATION = 500; // 500ms
            const SCALE_ANIMATION_DURATION = 2000; // 2s

            const startPress = (e) => {
                e.preventDefault(); // 防止觸控時的預設行為(如選取文字)
                longPressTriggered = false;
                const emojiChar = e.currentTarget.dataset.emoji;

                pressTimer = setTimeout(() => {
                    longPressTriggered = true;

                    // 如果是 '💩' emoji，播放音效
                    if (emojiChar === '💩') {
                        const currentPoopSound = new Audio('audio/poop.mp3');
                        currentPoopSound.play();
                    }

                    // 創建長按的 Emoji
                    const container = document.getElementById('long-press-container');
                    longPressEmoji = document.createElement('span');
                    longPressEmoji.innerText = emojiChar;
                    longPressEmoji.classList.add('long-press-emoji');
                    longPressEmoji.style.animation = `long-press-scale ${SCALE_ANIMATION_DURATION}ms forwards`;
                    container.appendChild(longPressEmoji);

                }, LONG_PRESS_DURATION);
            };

            const endPress = (e) => {
                clearTimeout(pressTimer);
                const emojiChar = e.currentTarget.dataset.emoji;

                if (longPressTriggered) {
                    // 觸發爆炸
                    if (longPressEmoji) {
                        explode(longPressEmoji);
                        longPressEmoji.remove();
                        longPressEmoji = null;
                    }
                } else {
                    // 執行短按 (原本的 emoji 雨)
                    releaseEmojis(emojiChar);
                }
                longPressTriggered = false; // 重置
            };

            const cancelPress = (e) => {
                clearTimeout(pressTimer);
                if (longPressEmoji) {
                    longPressEmoji.remove();
                    longPressEmoji = null;
                }
                longPressTriggered = false;
            };

            const explode = (element) => {
                const container = document.getElementById('long-press-container');
                const emojiChar = element.innerText;
                const PARTICLE_COUNT = 100; // 增加爆炸時的 emoji 數量

                // 如果是 '💩' emoji，觸發連續音效
                if (emojiChar === '💩') {
                    const SOUND_COUNT = 10; // 連續音效的次數
                    const SOUND_INTERVAL = 50; // 音效間隔 (ms)
                    for (let i = 0; i < SOUND_COUNT; i++) {
                        setTimeout(() => {
                            const sound = new Audio('audio/poop.mp3');
                            sound.play();
                        }, i * SOUND_INTERVAL);
                    }
                }
                
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const particle = document.createElement('span');
                    particle.innerText = emojiChar;
                    particle.classList.add('particle');

                    const angle = Math.random() * 360;
                    const radius = Math.random() * 300 + 150; // 調整半徑，讓 emoji 散開更遠
                    
                    const x = Math.cos(angle * Math.PI / 180) * radius;
                    const y = Math.sin(angle * Math.PI / 180) * radius;

                    particle.style.setProperty('--x', `${x}px`);
                    particle.style.setProperty('--y', `${y}px`);

                    container.appendChild(particle);

                    setTimeout(() => particle.remove(), 800);
                }
            };

            buttons.forEach(button => {
                button.addEventListener('mousedown', startPress);
                button.addEventListener('mouseup', endPress);
                button.addEventListener('mouseleave', cancelPress);
                button.addEventListener('touchstart', startPress);
                button.addEventListener('touchend', endPress);
            });
        }


        // 初始化
        getNewVerse(); // 載入時立即顯示一則隨機經文
        setInterval(updateTimer, 1000);
        updateTimer(); // 網頁載入時先執行一次
        initLongPress(); // 啟用長按功能
    </script>

    <script>
        const fireButton = document.getElementById('fire-button');
        const video = document.getElementById('fullscreen-video');

        fireButton.addEventListener('click', () => {
            video.style.display = 'block';
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.mozRequestFullScreen) { /* Firefox */
                video.mozRequestFullScreen();
            } else if (video.webkitRequestFullscreen) { /* Chrome, Safari & Opera */
                video.webkitRequestFullscreen();
            } else if (video.msRequestFullscreen) { /* IE/Edge */
                video.msRequestFullscreen();
            }
            video.play();
        });

        video.addEventListener('ended', () => {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.mozCancelFullScreen) { /* Firefox */
                document.mozCancelFullScreen();
            } else if (document.webkitExitFullscreen) { /* Chrome, Safari and Opera */
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) { /* IE/Edge */
                document.msExitFullscreen();
            }
            video.style.display = 'none';
        });

        document.addEventListener('fullscreenchange', exitHandler);
        document.addEventListener('webkitfullscreenchange', exitHandler);
        document.addEventListener('mozfullscreenchange', exitHandler);
        document.addEventListener('MSFullscreenChange', exitHandler);

        function exitHandler() {
            if (!document.fullscreenElement && !document.webkitIsFullScreen && !document.mozFullScreen && !document.msFullscreenElement) {
                video.pause();
                video.currentTime = 0;
                video.style.display = 'none';
            }
        }
    </script>
</body>
